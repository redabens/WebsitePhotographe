<!doctype html>
<html lang="fr" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sofiane Chaab — Photographie d'Art & Direction Artistique</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body class="bg-[#F9F8F6] text-[#1A1A1A] antialiased">
    <div id="root"></div>
    
    <!-- Hidden form mirror for Netlify build-time form detection -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="nom" />
      <input type="email" name="email" />
      <input type="text" name="prestation" />
      <input type="text" name="date" />
      <textarea name="message"></textarea>
      <input type="text" name="reference" />
    </form>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
